<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Photography</title>

  <style>
    @font-face { font-family:'Lora'; src:url('assets/fonts/lora-v23-latin-regular.woff2') format('woff2'); font-weight:400; font-style:normal; font-display:swap; }
    @font-face { font-family:'Lora'; src:url('assets/fonts/lora-v23-latin-italic.woff2') format('woff2'); font-weight:400; font-style:italic; font-display:swap; }
    @font-face { font-family:'Lora'; src:url('assets/fonts/lora-v23-latin-700.woff2') format('woff2'); font-weight:700; font-style:normal; font-display:swap; }
    @font-face { font-family:'Inter'; src:url('assets/fonts/inter-v8-latin-regular.woff2') format('woff2'); font-weight:400; font-style:normal; font-display:swap; }
    @font-face { font-family:'Inter'; src:url('assets/fonts/inter-v8-latin-600.woff2') format('woff2'); font-weight:600; font-style:normal; font-display:swap; }
    @font-face { font-family:'Inter'; src:url('assets/fonts/inter-v8-latin-700.woff2') format('woff2'); font-weight:700; font-style:normal; font-display:swap; }
  </style>

  <style>
    :root {
      --font-sans: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-serif: Lora, Times, serif;
      --bg:        #f5f5f3;
      --bg-card:   #eeede9;
      --text:      #1a1a1a;
      --text-mid:  #6b6b6b;
      --text-soft: #9e9e9e;
      --border:    #e2e1dd;
      --gap:       28px;
      --header-h:  60px;
      --ease:      0.28s cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html { font-size:62.5%; -webkit-font-smoothing:antialiased; }
    body { font-family:var(--font-sans); background:var(--bg); color:var(--text); font-size:1.5rem; line-height:1.6; }
    a { color:inherit; text-decoration:none; }
    img { display:block; width:100%; }

    /* ── HEADER ── */
    .site-head {
      position:sticky; top:0; z-index:200;
      height:var(--header-h);
      background:rgba(245,245,243,0.92);
      backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      display:flex; align-items:center;
      padding:0 max(5vw,28px);
    }
    .head-inner {
      width:100%; max-width:1400px; margin:0 auto;
      display:flex; align-items:center; justify-content:space-between;
    }
    .site-logo {
      font-family:var(--font-serif);
      font-size:1.7rem; font-weight:700;
      letter-spacing:-0.02em;
    }
    .site-nav { display:flex; align-items:center; gap:3.6rem; }
    .nav-link {
      font-size:1.25rem; font-weight:600;
      letter-spacing:0.04em; text-transform:uppercase;
      color:var(--text-mid);
      transition:color var(--ease);
    }
    .nav-link:hover, .nav-link.active { color:var(--text); }

    /* theme nav right side */
    .theme-nav { display:flex; align-items:center; gap:2.4rem; }
    .theme-link {
      font-size:1.2rem; font-weight:600;
      letter-spacing:0.05em; text-transform:uppercase;
      color:var(--text-soft);
      transition:color var(--ease);
      padding-bottom:2px;
      border-bottom:2px solid transparent;
    }
    .theme-link:hover { color:var(--text-mid); }
    .theme-link.active { color:var(--text); border-bottom-color:var(--text); }

    /* burger */
    .gh-burger { display:none; flex-direction:column; gap:5px; background:none; border:none; cursor:pointer; padding:4px; }
    .gh-burger span { display:block; width:20px; height:1.5px; background:var(--text); transition:transform var(--ease), opacity var(--ease); }

    /* mobile menu */
    .mobile-menu {
      display:none; position:fixed; top:var(--header-h); left:0; right:0;
      background:var(--bg); border-bottom:1px solid var(--border);
      padding:2rem max(5vw,28px); z-index:199;
      flex-direction:column; gap:0;
    }
    .mobile-menu.open { display:flex; }
    .mobile-menu-section { padding:1.2rem 0; border-bottom:1px solid var(--border); }
    .mobile-menu-section:last-child { border-bottom:none; }
    .mobile-menu-label { font-size:1.1rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-soft); margin-bottom:1rem; }
    .mobile-menu-links { display:flex; flex-wrap:wrap; gap:1.2rem 2rem; }
    .mobile-menu-links a { font-size:1.4rem; font-weight:600; color:var(--text-mid); }
    .mobile-menu-links a.active { color:var(--text); }

    /* ── HERO ── */
    .site-hero {
      padding:5rem max(5vw,28px) 3.6rem;
      max-width:1400px; margin:0 auto;
    }
    .hero-eyebrow {
      font-size:1.1rem; letter-spacing:0.1em; text-transform:uppercase;
      color:var(--text-soft); margin-bottom:1rem;
    }
    .hero-title {
      font-family:var(--font-serif);
      font-size:clamp(3rem,4.5vw,5rem);
      font-weight:700; letter-spacing:-0.03em; line-height:1.08;
      color:var(--text);
    }
    .hero-sub {
      font-family:var(--font-serif); font-style:italic;
      font-size:1.7rem; color:var(--text-soft); margin-top:1rem;
    }
    /* theme page hero */
    .theme-hero { display:none; }
    .theme-hero.visible { display:block; }
    .theme-hero .hero-eyebrow { color:var(--text-mid); }

    /* ── MASONRY FEED ── */
    .site-main { padding:0 max(5vw,28px) 6rem; }
    .feed-wrap { max-width:1400px; margin:0 auto; }

    .post-feed {
      columns:3;
      column-gap:var(--gap);
      opacity:0; transition:opacity 0.4s ease;
    }
    .post-feed.loaded { opacity:1; }

    .post-card {
      break-inside:avoid;
      margin-bottom:var(--gap);
      cursor:pointer;
      position:relative;
      border-radius:2px;
      overflow:hidden;
      background:var(--bg-card);
    }
    /* uneven masonry: every 5th card gets extra top margin */
    .post-card:nth-child(5n+2) { margin-top:calc(var(--gap) * 1.5); }
    .post-card:nth-child(5n+4) { margin-top:calc(var(--gap) * 0.6); }

    .card-img-wrap { overflow:hidden; position:relative; }
    .card-img {
      width:100%; display:block;
      transition:transform 0.55s cubic-bezier(.4,0,.2,1);
      object-fit:cover;
    }
    .post-card:hover .card-img { transform:scale(1.04); }

    .card-overlay {
      position:absolute; inset:0;
      background:linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 52%);
      opacity:0; transition:opacity var(--ease);
      display:flex; align-items:flex-end; padding:2rem 1.8rem;
    }
    .post-card:hover .card-overlay { opacity:1; }
    .card-overlay-title {
      font-family:var(--font-serif); font-size:1.5rem; font-weight:700;
      color:#fff; line-height:1.25;
    }
    .card-overlay-theme {
      font-size:1.05rem; letter-spacing:0.06em; text-transform:uppercase;
      color:rgba(255,255,255,0.55); margin-top:0.3rem;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      position:fixed; inset:0; z-index:1000;
      background:rgba(20,20,20,0.96);
      display:flex; align-items:center; justify-content:center;
      opacity:0; pointer-events:none;
      transition:opacity 0.3s ease;
    }
    .lightbox.open { opacity:1; pointer-events:all; }
    .lb-inner {
      display:flex; flex-direction:column; align-items:center;
      max-width:min(92vw,1120px); max-height:96vh;
      transform:translateY(14px); transition:transform 0.3s ease;
    }
    .lightbox.open .lb-inner { transform:translateY(0); }
    .lb-img { max-width:100%; max-height:76vh; object-fit:contain; border-radius:2px; }
    .lb-caption { margin-top:2rem; text-align:center; color:rgba(255,255,255,0.88); max-width:620px; }
    .lb-caption h2 { font-family:var(--font-serif); font-size:1.9rem; font-weight:700; line-height:1.3; }
    .lb-caption p { font-family:var(--font-serif); font-style:italic; font-size:1.45rem; color:rgba(255,255,255,0.55); margin-top:0.8rem; line-height:1.65; }
    .lb-meta { font-family:var(--font-sans); font-size:1.1rem; letter-spacing:0.07em; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-top:1.2rem; }
    .lb-close { position:fixed; top:2rem; right:2.4rem; background:none; border:none; color:#fff; font-size:2.6rem; cursor:pointer; opacity:0.5; transition:opacity var(--ease); line-height:1; }
    .lb-close:hover { opacity:1; }
    .lb-nav { position:fixed; top:50%; transform:translateY(-50%); background:none; border:none; color:#fff; font-size:3.2rem; cursor:pointer; opacity:0.4; transition:opacity var(--ease); padding:1.2rem; }
    .lb-nav:hover { opacity:0.9; }
    .lb-nav.prev { left:1rem; }
    .lb-nav.next { right:1rem; }

    /* ── EMPTY ── */
    .empty-state { text-align:center; padding:8rem 2rem; color:var(--text-soft); }
    .empty-state h2 { font-family:var(--font-serif); font-size:2.4rem; color:var(--text); margin-bottom:1rem; }

    /* ── FOOTER ── */
    .site-foot {
      border-top:1px solid var(--border);
      padding:2.4rem max(5vw,28px);
    }
    .foot-inner {
      max-width:1400px; margin:0 auto;
      display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1.2rem;
    }
    .foot-copy { font-size:1.2rem; color:var(--text-soft); }
    .foot-social { display:flex; gap:2rem; }
    .foot-social a { font-size:1.2rem; font-weight:600; color:var(--text-soft); transition:color var(--ease); }
    .foot-social a:hover { color:var(--text); }

    /* ── RESPONSIVE ── */
    @media (max-width:1020px) { .post-feed { columns:2; } }
    @media (max-width:640px) {
      :root { --gap:14px; }
      .post-feed { columns:2; }
      .theme-nav { display:none; }
      .site-nav .nav-link:not(:first-child) { display:none; }
      .gh-burger { display:flex; }
      .lb-nav { display:none; }
    }
  </style>
</head>
<body>

<div class="site">

  <!-- HEADER -->
  <header class="site-head">
    <div class="head-inner">
      <a class="site-logo" href="index.html" id="site-logo">Photography</a>

      <nav class="site-nav">
        <a class="nav-link active" href="#" id="nav-home">All</a>
      </nav>

      <!-- Theme links top-right -->
      <nav class="theme-nav" id="theme-nav">
        <!-- injected by JS -->
      </nav>

      <button class="gh-burger" id="gh-burger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- MOBILE MENU -->
  <div class="mobile-menu" id="mobile-menu">
    <div class="mobile-menu-section">
      <div class="mobile-menu-label">Browse</div>
      <div class="mobile-menu-links" id="mm-browse"></div>
    </div>
    <div class="mobile-menu-section">
      <div class="mobile-menu-label">Themes</div>
      <div class="mobile-menu-links" id="mm-themes"></div>
    </div>
  </div>

  <!-- HERO -->
  <section class="site-hero">
    <div id="home-hero">
      <div class="hero-eyebrow" id="hero-eyebrow">Photography</div>
      <h1 class="hero-title" id="hero-title">The Usual Subjects</h1>
      <p class="hero-sub" id="hero-sub">Stories told through a lens.</p>
    </div>
    <div class="theme-hero" id="theme-hero">
      <div class="hero-eyebrow" id="theme-eyebrow">Theme</div>
      <h1 class="hero-title" id="theme-title"></h1>
    </div>
  </section>

  <!-- FEED -->
  <main class="site-main">
    <div class="feed-wrap">
      <div class="post-feed" id="post-feed"></div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-foot">
    <div class="foot-inner">
      <span class="foot-copy" id="foot-copy"></span>
      <div class="foot-social" id="foot-social"></div>
    </div>
  </footer>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close">&#x2715;</button>
  <button class="lb-nav prev" id="lb-prev">&#8249;</button>
  <div class="lb-inner">
    <img class="lb-img" id="lb-img" src="" alt="">
    <div class="lb-caption">
      <h2 id="lb-title"></h2>
      <p id="lb-caption-text"></p>
      <p class="lb-meta" id="lb-meta"></p>
    </div>
  </div>
  <button class="lb-nav next" id="lb-next">&#8250;</button>
</div>

<script src="posts.js"></script>
<script>
// ── STATE ────────────────────────────────────────────────────
let activeTheme = null; // null = show all
let visiblePosts = [];
let lbIdx = 0;

// ── BOOT ────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Apply config
  document.title = SITE_CONFIG.title;
  document.getElementById('site-logo').textContent = SITE_CONFIG.title;
  document.getElementById('hero-title').textContent = SITE_CONFIG.title;
  document.getElementById('hero-sub').textContent = SITE_CONFIG.about;
  document.getElementById('foot-copy').innerHTML = '&copy; ' + new Date().getFullYear() + ' ' + SITE_CONFIG.title;

  // Social
  const social = document.getElementById('foot-social');
  if (SITE_CONFIG.instagram) social.innerHTML += `<a href="https://instagram.com/${SITE_CONFIG.instagram}" target="_blank">Instagram</a>`;
  if (SITE_CONFIG.email) social.innerHTML += `<a href="mailto:${SITE_CONFIG.email}">Contact</a>`;

  // Build theme nav
  buildThemeNav();

  // Render all posts
  renderFeed(null);

  // Burger
  const burger = document.getElementById('gh-burger');
  const mmenu = document.getElementById('mobile-menu');
  burger.addEventListener('click', () => {
    mmenu.classList.toggle('open');
    const s = burger.querySelectorAll('span');
    if (mmenu.classList.contains('open')) {
      s[0].style.transform='rotate(45deg) translate(5px,5px)';
      s[1].style.opacity='0';
      s[2].style.transform='rotate(-45deg) translate(5px,-5px)';
    } else {
      s[0].style.transform=s[1].style.opacity=s[2].style.transform='';
    }
  });

  // Lightbox events
  document.getElementById('lb-close').addEventListener('click', closeLb);
  document.getElementById('lb-prev').addEventListener('click', () => shiftLb(-1));
  document.getElementById('lb-next').addEventListener('click', () => shiftLb(1));
  document.getElementById('lightbox').addEventListener('click', e => { if(e.target===e.currentTarget) closeLb(); });
  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key==='Escape') closeLb();
    if (e.key==='ArrowLeft') shiftLb(-1);
    if (e.key==='ArrowRight') shiftLb(1);
  });
});

// ── THEME NAV ───────────────────────────────────────────────
function buildThemeNav() {
  const nav = document.getElementById('theme-nav');
  const mmThemes = document.getElementById('mm-themes');
  const mmBrowse = document.getElementById('mm-browse');

  // All link in mobile
  const allMob = document.createElement('a');
  allMob.href='#'; allMob.textContent='All Photos'; allMob.className='active';
  allMob.addEventListener('click', e => { e.preventDefault(); setTheme(null); closeMobileMenu(); });
  mmBrowse.appendChild(allMob);

  THEMES.forEach(t => {
    // Desktop nav
    const a = document.createElement('a');
    a.className='theme-link'; a.href='#'; a.textContent=t.label; a.dataset.id=t.id;
    a.addEventListener('click', e => { e.preventDefault(); setTheme(t.id); });
    nav.appendChild(a);

    // Mobile nav
    const am = document.createElement('a');
    am.href='#'; am.textContent=t.label; am.dataset.id=t.id;
    am.addEventListener('click', e => { e.preventDefault(); setTheme(t.id); closeMobileMenu(); });
    mmThemes.appendChild(am);
  });
}

function closeMobileMenu() {
  document.getElementById('mobile-menu').classList.remove('open');
  const s = document.getElementById('gh-burger').querySelectorAll('span');
  s[0].style.transform=s[1].style.opacity=s[2].style.transform='';
}

// ── SET THEME ───────────────────────────────────────────────
function setTheme(themeId) {
  activeTheme = themeId;

  // Update nav highlights
  document.querySelectorAll('.theme-link').forEach(a => a.classList.toggle('active', a.dataset.id===themeId));
  document.getElementById('nav-home').classList.toggle('active', !themeId);
  document.querySelectorAll('#mm-themes a, #mm-browse a').forEach(a => {
    a.classList.toggle('active', themeId ? a.dataset.id===themeId : a.textContent==='All Photos');
  });

  // Toggle hero
  const homeHero = document.getElementById('home-hero');
  const themeHero = document.getElementById('theme-hero');
  if (themeId) {
    const t = THEMES.find(x=>x.id===themeId);
    homeHero.style.display='none';
    themeHero.classList.add('visible');
    document.getElementById('theme-eyebrow').textContent = 'Theme';
    document.getElementById('theme-title').textContent = t ? t.label : themeId;
  } else {
    homeHero.style.display='';
    themeHero.classList.remove('visible');
  }

  renderFeed(themeId);
  window.scrollTo({top:0, behavior:'smooth'});
}

// ── RENDER FEED ─────────────────────────────────────────────
function renderFeed(themeId) {
  const feed = document.getElementById('post-feed');
  feed.classList.remove('loaded');
  feed.innerHTML='';

  visiblePosts = themeId ? POSTS.filter(p=>p.theme===themeId) : [...POSTS];

  if (visiblePosts.length===0) {
    feed.innerHTML='<div class="empty-state"><h2>No photos yet</h2><p>Add some posts to posts.js</p></div>';
    return;
  }

  const themeMap = {};
  THEMES.forEach(t => themeMap[t.id]=t.label);

  visiblePosts.forEach((post, idx) => {
    const card = document.createElement('article');
    card.className='post-card';
    const themeName = themeMap[post.theme] || post.theme || '';
    card.innerHTML=`
      <div class="card-img-wrap">
        <img class="card-img" src="${esc(post.image)}" alt="${esc(post.title)}" loading="${idx<6?'eager':'lazy'}" decoding="async">
        <div class="card-overlay">
          <div>
            <div class="card-overlay-title">${esc(post.title)}</div>
            ${themeName ? `<div class="card-overlay-theme">${esc(themeName)}</div>` : ''}
          </div>
        </div>
      </div>`;
    card.addEventListener('click', () => openLb(idx));
    feed.appendChild(card);
  });

  requestAnimationFrame(() => feed.classList.add('loaded'));
}

// ── LIGHTBOX ────────────────────────────────────────────────
function openLb(idx) {
  lbIdx=idx; updateLb();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeLb() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow='';
}
function shiftLb(dir) {
  const n = lbIdx+dir;
  if (n>=0 && n<visiblePosts.length) { lbIdx=n; updateLb(); }
}
function updateLb() {
  const p = visiblePosts[lbIdx];
  const themeMap={}; THEMES.forEach(t=>themeMap[t.id]=t.label);
  document.getElementById('lb-img').src=p.image;
  document.getElementById('lb-img').alt=p.title;
  document.getElementById('lb-title').textContent=p.title;
  document.getElementById('lb-caption-text').textContent=p.caption||'';
  const parts=[]; if(p.date) parts.push(fmtDate(p.date)); if(p.theme&&themeMap[p.theme]) parts.push(themeMap[p.theme]);
  document.getElementById('lb-meta').textContent=parts.join('  ·  ');
  document.getElementById('lb-prev').style.visibility=lbIdx>0?'visible':'hidden';
  document.getElementById('lb-next').style.visibility=lbIdx<visiblePosts.length-1?'visible':'hidden';
}

// ── HELPERS ─────────────────────────────────────────────────
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(s){ try{ return new Date(s).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}); }catch{return s;} }
</script>
</body>
</html>
