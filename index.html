<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title id="page-title">Photography Blog</title>
  <meta name="description" content="Photography blog">

  <!-- Fonts matching Edge theme -->
  <style>
    @font-face {
      font-family: 'Lora';
      src: url('assets/fonts/lora-v23-latin-regular.woff2') format('woff2'),
           url('assets/fonts/lora-v23-latin-regular.woff') format('woff');
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Lora';
      src: url('assets/fonts/lora-v23-latin-italic.woff2') format('woff2'),
           url('assets/fonts/lora-v23-latin-italic.woff') format('woff');
      font-weight: 400; font-style: italic; font-display: swap;
    }
    @font-face {
      font-family: 'Lora';
      src: url('assets/fonts/lora-v23-latin-700.woff2') format('woff2'),
           url('assets/fonts/lora-v23-latin-700.woff') format('woff');
      font-weight: 700; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Inter';
      src: url('assets/fonts/inter-v8-latin-regular.woff2') format('woff2'),
           url('assets/fonts/inter-v8-latin-regular.woff') format('woff');
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Inter';
      src: url('assets/fonts/inter-v8-latin-600.woff2') format('woff2'),
           url('assets/fonts/inter-v8-latin-600.woff') format('woff');
      font-weight: 600; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Inter';
      src: url('assets/fonts/inter-v8-latin-700.woff2') format('woff2'),
           url('assets/fonts/inter-v8-latin-700.woff') format('woff');
      font-weight: 700; font-style: normal; font-display: swap;
    }
  </style>

  <style>
    /* ── VARIABLES (Edge theme palette) ── */
    :root {
      --font-sans: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      --font-serif: Lora, Times, serif;
      --color-bg: #ffffff;
      --color-text: #15171a;
      --color-secondary: #738a94;
      --color-border: #e6e8eb;
      --color-card-bg: #f9f9f9;
      --color-accent: #15171a;
      --grid-gap: 16px;
      --header-height: 64px;
      --transition: 0.25s ease;
    }

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 62.5%; -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font-sans);
      font-size: 1.6rem;
      color: var(--color-text);
      background: var(--color-bg);
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; width: 100%; height: auto; }

    /* ── LAYOUT ── */
    .site { display: flex; flex-direction: column; min-height: 100vh; }
    .gh-outer { padding: 0 max(4vw, 20px); }
    .gh-inner { max-width: 1200px; margin: 0 auto; }

    /* ── HEADER ── */
    .gh-head {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--color-border);
      height: var(--header-height);
      display: flex; align-items: center;
    }
    .gh-head-inner {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; max-width: 1200px; margin: 0 auto;
    }
    .gh-head-logo {
      font-family: var(--font-serif);
      font-size: 2rem; font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--color-text);
    }
    .gh-head-menu {
      display: flex; gap: 3.2rem; align-items: center;
    }
    .gh-head-link {
      font-size: 1.4rem; font-weight: 600;
      letter-spacing: -0.009em;
      color: var(--color-text);
      transition: opacity var(--transition);
    }
    .gh-head-link:hover { opacity: 0.6; }
    .gh-burger {
      display: none; flex-direction: column; gap: 5px;
      background: none; border: none; cursor: pointer; padding: 4px;
    }
    .gh-burger span {
      display: block; width: 22px; height: 2px;
      background: var(--color-text);
      transition: transform var(--transition), opacity var(--transition);
    }

    /* ── HERO (shown on homepage) ── */
    .site-hero {
      padding: 6rem max(4vw, 20px) 4rem;
      border-bottom: 1px solid var(--color-border);
    }
    .site-hero-inner { max-width: 1200px; margin: 0 auto; }
    .site-hero h1 {
      font-family: var(--font-serif);
      font-size: clamp(3.2rem, 5vw, 5.6rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }
    .site-hero p {
      font-size: 1.8rem; color: var(--color-secondary);
      margin-top: 1.2rem;
      font-style: italic; font-family: var(--font-serif);
    }

    /* ── MASONRY FEED ── */
    .site-main { flex: 1; padding: 4rem max(4vw, 20px); }
    .post-feed {
      max-width: 1200px; margin: 0 auto;
      columns: 3; column-gap: var(--grid-gap);
      opacity: 0; transition: opacity 0.4s ease;
    }
    .post-feed.loaded { opacity: 1; }
    .post-card {
      break-inside: avoid;
      margin-bottom: var(--grid-gap);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      border-radius: 3px;
    }
    .post-card-image-wrap {
      position: relative; overflow: hidden;
      background: var(--color-card-bg);
    }
    .post-card-image {
      width: 100%; display: block;
      transition: transform 0.5s ease;
      object-fit: cover;
    }
    .post-card:hover .post-card-image { transform: scale(1.03); }
    .post-card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0) 55%);
      opacity: 0; transition: opacity var(--transition);
      display: flex; align-items: flex-end; padding: 2rem;
    }
    .post-card:hover .post-card-overlay { opacity: 1; }
    .post-card-overlay-text {
      color: #fff;
    }
    .post-card-overlay-title {
      font-family: var(--font-serif);
      font-size: 1.6rem; font-weight: 700;
      line-height: 1.25;
    }
    .post-card-overlay-date {
      font-size: 1.2rem; opacity: 0.7; margin-top: 0.4rem;
      font-family: var(--font-sans); letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.94);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .lightbox.open { opacity: 1; pointer-events: all; }
    .lightbox-inner {
      max-width: min(90vw, 1100px);
      max-height: 96vh;
      display: flex; flex-direction: column;
      align-items: center;
      transform: translateY(16px); transition: transform 0.3s ease;
    }
    .lightbox.open .lightbox-inner { transform: translateY(0); }
    .lightbox-img {
      max-width: 100%; max-height: 78vh;
      object-fit: contain; border-radius: 2px;
    }
    .lightbox-caption {
      margin-top: 2rem; text-align: center;
      color: rgba(255,255,255,0.9); max-width: 640px;
    }
    .lightbox-caption h2 {
      font-family: var(--font-serif);
      font-size: 2rem; font-weight: 700;
      line-height: 1.3;
    }
    .lightbox-caption p {
      font-size: 1.5rem; color: rgba(255,255,255,0.65);
      margin-top: 0.8rem; line-height: 1.65;
      font-family: var(--font-serif); font-style: italic;
    }
    .lightbox-caption .lb-date {
      font-family: var(--font-sans);
      font-size: 1.2rem; letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-top: 1.2rem;
      font-style: normal;
    }
    .lightbox-close {
      position: fixed; top: 2rem; right: 2.4rem;
      background: none; border: none; color: #fff;
      font-size: 2.8rem; cursor: pointer; opacity: 0.6;
      transition: opacity var(--transition); line-height: 1;
    }
    .lightbox-close:hover { opacity: 1; }
    .lightbox-nav {
      position: fixed; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #fff;
      font-size: 3rem; cursor: pointer; opacity: 0.5;
      transition: opacity var(--transition); padding: 1rem;
    }
    .lightbox-nav:hover { opacity: 1; }
    .lightbox-nav.prev { left: 1.6rem; }
    .lightbox-nav.next { right: 1.6rem; }

    /* ── FOOTER ── */
    .gh-foot {
      border-top: 1px solid var(--color-border);
      padding: 3rem max(4vw, 20px);
    }
    .gh-foot-inner {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1.6rem;
    }
    .gh-copyright { font-size: 1.3rem; color: var(--color-secondary); }
    .gh-social { display: flex; gap: 1.6rem; }
    .gh-social a {
      font-size: 1.3rem; font-weight: 600;
      color: var(--color-secondary);
      transition: color var(--transition);
    }
    .gh-social a:hover { color: var(--color-text); }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center; padding: 8rem 2rem;
      color: var(--color-secondary);
    }
    .empty-state h2 {
      font-family: var(--font-serif); font-size: 2.4rem; font-weight: 700;
      margin-bottom: 1rem; color: var(--color-text);
    }
    .empty-state p { font-size: 1.6rem; }

    /* ── LOADING SKELETON ── */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 3px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── RESPONSIVE ── */
    @media (max-width: 1019px) {
      .post-feed { columns: 2; }
    }
    @media (max-width: 600px) {
      .post-feed { columns: 2; --grid-gap: 6px; }
      .gh-head-menu { display: none; }
      .gh-head-menu.open {
        display: flex; flex-direction: column;
        position: fixed; top: var(--header-height); left: 0; right: 0;
        background: #fff; padding: 2rem max(4vw, 20px);
        border-bottom: 1px solid var(--color-border);
        z-index: 99; gap: 2rem;
      }
      .gh-burger { display: flex; }
      .lightbox-nav { display: none; }
      .lightbox-caption h2 { font-size: 1.6rem; }
      .lightbox-caption p { font-size: 1.3rem; }
    }
  </style>
</head>

<body>
<div class="site">

  <!-- HEADER -->
  <header class="gh-head gh-outer">
    <div class="gh-head-inner">
      <a class="gh-head-logo" href="index.html" id="site-logo">Photography</a>
      <nav class="gh-head-menu" id="gh-menu">
        <a class="gh-head-link" href="index.html">Home</a>
        <a class="gh-head-link" href="#about">About</a>
      </nav>
      <button class="gh-burger" id="gh-burger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- HERO -->
  <section class="site-hero gh-outer">
    <div class="site-hero-inner">
      <h1 id="hero-title">Photography</h1>
      <p id="hero-tagline">Stories told through a lens.</p>
    </div>
  </section>

  <!-- PHOTO FEED -->
  <main class="site-main">
    <div class="post-feed" id="post-feed">
      <!-- Cards injected by JS -->
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="gh-foot gh-outer" id="about">
    <div class="gh-foot-inner">
      <span class="gh-copyright" id="footer-copy">&copy; 2024</span>
      <div class="gh-social" id="footer-social"></div>
    </div>
  </footer>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <button class="lightbox-close" id="lb-close" aria-label="Close">&#x2715;</button>
  <button class="lightbox-nav prev" id="lb-prev" aria-label="Previous">&#8249;</button>
  <div class="lightbox-inner">
    <img class="lightbox-img" id="lb-img" src="" alt="">
    <div class="lightbox-caption">
      <h2 id="lb-title"></h2>
      <p id="lb-caption"></p>
      <p class="lb-date" id="lb-date"></p>
    </div>
  </div>
  <button class="lightbox-nav next" id="lb-next" aria-label="Next">&#8250;</button>
</div>

<!-- DATA FILE -->
<script src="posts.js"></script>

<script>
  // ── BOOT ────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {

    // Apply site config
    document.title = SITE_CONFIG.title + ' — ' + SITE_CONFIG.tagline;
    document.getElementById('page-title').textContent = document.title;
    document.getElementById('site-logo').textContent = SITE_CONFIG.title;
    document.getElementById('hero-title').textContent = SITE_CONFIG.title;
    document.getElementById('hero-tagline').textContent = SITE_CONFIG.tagline;
    document.getElementById('footer-copy').innerHTML =
      '&copy; ' + new Date().getFullYear() + ' ' + SITE_CONFIG.title;

    // Social links
    const social = document.getElementById('footer-social');
    if (SITE_CONFIG.instagram) {
      social.innerHTML += `<a href="https://instagram.com/${SITE_CONFIG.instagram}" target="_blank" rel="noopener">Instagram</a>`;
    }
    if (SITE_CONFIG.email) {
      social.innerHTML += `<a href="mailto:${SITE_CONFIG.email}">Email</a>`;
    }

    // Render feed
    renderFeed();

    // Burger menu
    const burger = document.getElementById('gh-burger');
    const menu = document.getElementById('gh-menu');
    burger.addEventListener('click', () => {
      menu.classList.toggle('open');
      const spans = burger.querySelectorAll('span');
      menu.classList.contains('open')
        ? (spans[0].style.transform='rotate(45deg) translate(5px,5px)',
           spans[1].style.opacity='0',
           spans[2].style.transform='rotate(-45deg) translate(5px,-5px)')
        : (spans[0].style.transform='',spans[1].style.opacity='',spans[2].style.transform='');
    });
  });

  // ── RENDER FEED ─────────────────────────────────────────────
  function renderFeed() {
    const feed = document.getElementById('post-feed');
    feed.innerHTML = '';

    if (!POSTS || POSTS.length === 0) {
      feed.outerHTML = `<div class="empty-state">
        <h2>No posts yet</h2>
        <p>Open <code>posts.js</code> and add your first photo.</p>
      </div>`;
      return;
    }

    POSTS.forEach((post, idx) => {
      const card = document.createElement('article');
      card.className = 'post-card';
      card.dataset.idx = idx;
      card.innerHTML = `
        <div class="post-card-image-wrap">
          <img class="post-card-image"
               src="${post.image}"
               alt="${escHtml(post.title)}"
               loading="${idx < 6 ? 'eager' : 'lazy'}"
               decoding="async">
          <div class="post-card-overlay">
            <div class="post-card-overlay-text">
              <div class="post-card-overlay-title">${escHtml(post.title)}</div>
              <div class="post-card-overlay-date">${formatDate(post.date)}</div>
            </div>
          </div>
        </div>
      `;
      card.addEventListener('click', () => openLightbox(idx));
      feed.appendChild(card);
    });

    // Fade in after images start loading
    requestAnimationFrame(() => feed.classList.add('loaded'));
  }

  // ── LIGHTBOX ────────────────────────────────────────────────
  let currentIdx = 0;

  function openLightbox(idx) {
    currentIdx = idx;
    updateLightbox();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function updateLightbox() {
    const post = POSTS[currentIdx];
    document.getElementById('lb-img').src = post.image;
    document.getElementById('lb-img').alt = post.title;
    document.getElementById('lb-title').textContent = post.title;
    document.getElementById('lb-caption').textContent = post.caption || '';
    document.getElementById('lb-date').textContent = formatDate(post.date);
    // hide/show nav
    document.getElementById('lb-prev').style.visibility = currentIdx > 0 ? 'visible' : 'hidden';
    document.getElementById('lb-next').style.visibility = currentIdx < POSTS.length - 1 ? 'visible' : 'hidden';
  }

  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-prev').addEventListener('click', () => {
    if (currentIdx > 0) { currentIdx--; updateLightbox(); }
  });
  document.getElementById('lb-next').addEventListener('click', () => {
    if (currentIdx < POSTS.length - 1) { currentIdx++; updateLightbox(); }
  });
  document.getElementById('lightbox').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeLightbox();
  });
  document.addEventListener('keydown', (e) => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft' && currentIdx > 0) { currentIdx--; updateLightbox(); }
    if (e.key === 'ArrowRight' && currentIdx < POSTS.length - 1) { currentIdx++; updateLightbox(); }
  });

  // ── HELPERS ─────────────────────────────────────────────────
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function formatDate(str) {
    if (!str) return '';
    try {
      return new Date(str).toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
    } catch { return str; }
  }
</script>
</body>
</html>
